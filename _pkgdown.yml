url: https://mjfrigaard.github.io/tooltipexplorer/

navbar:
  bg: "#05070a"     # near-black navbar, matching the app
  type: dark        # light/amber text for contrast on the near-black bar
  structure:
    left: [intro, reference, articles]
    right: [search, github]

template:
  bootstrap: 5
  theme: arrow-dark
  bslib:
    bg:         "#0b0e13"  # Terminal background — near-black
    fg:         "#d5dde5"  # Body text
    primary:    "#ff9e1b"  # Bloomberg amber   — links, buttons, navbar accent
    secondary:  "#8b95a1"  # Muted grey        — neutral text emphasis
    success:    "#2ecc71"  # Up / green
    info:       "#4ea1ff"  # Cyan              — softer secondary accent
    warning:    "#ff6a1a"  # Orange
    danger:     "#ff4d4f"  # Down / red
    code-color: "#ffbf57"  # Bright amber      — inline & block code text
    code-bg:    "#1a1f28"  # Panel-2           — inline & block code background
    base_font:
      google: "IBM Plex Mono"
    heading_font:
      google: "IBM Plex Mono"
    code_font:
      google: "IBM Plex Mono"

articles:
  - title: "Getting started"
    navbar: ~
    contents:
      - tooltips-hover-info
  - title: "Deep dives"
    navbar: ~
    contents:
      - modules
      - theme
      - logger-namespaces

reference:
  - title: "App"
    desc: "Entry points for creating and running the Shiny application."
    contents:
      - launch
      - app_ui
      - app_server

  - title: "Theme"
    desc: "Dark, Bloomberg-terminal styling applied to the app UI."
    contents:
      - tooltipexplorer_theme

  - title: "Modules"
    desc: >
      Shiny modules following the `mod_<name>_ui()` / `mod_<name>_server()`
      convention. Each pair is co-located in a single `mod_<name>.R` file.
    contents:
      - mod_inputs_ui
      - mod_inputs_server
      - mod_outputs_ui
      - mod_outputs_server
      - mod_download_ui
      - mod_download_server

  - title: "Tooltip helpers"
    desc: >
      UI and rendering helpers for attaching tooltip and hover content.
      `mod_tooltip()` targets UI elements; `mod_hoverinfo()` targets
      `reactable` table cells.
    contents:
      - mod_tooltip
      - mod_hoverinfo

  - title: "Logic"
    desc: "Financial data retrieval and transformation functions."
    contents:
      - get_stock_prices
      - get_stock_returns
      - get_ff3_factors
      - compute_rolling_vol
      - summarise_performance
      - default_tickers

  - title: "Utilities"
    desc: "Logging helpers and operators."
    contents:
      - app_set_log_threshold
      - with_logging
      - "%||%"
