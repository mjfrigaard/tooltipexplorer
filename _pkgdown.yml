url: https://mjfrigaard.github.io/tooltipexplorer/

navbar:
  bg: primary       # paint the bar with $primary (Teal)
  type: dark        # use light text for contrast on the Teal bar
  structure:
    left: [intro, reference, articles]
    right: [search, github]

template:
  bootstrap: 5
  theme: arrow-light
  bslib:
    primary:   "#2A6F77"   # Teal            — links, buttons, navbar accent
    secondary: "#1B2A41"   # Midnight Navy   — neutral text emphasis
    success:   "#5B8C5A"   # Avocado Green
    info:      "#E8A33D"   # Harvest Gold
    warning:   "#D2562B"   # Burnt Orange
    danger:    "#B83A4B"   # Brick Red
    code-color: "#3E2A1E"  # Chocolate Brown — inline & block code text
    code-bg:    "#F2E6C2"  # Cream           — inline & block code background
    base_font:
      google: Ubuntu
    heading_font:
      google: Fira Sans Condensed
    code_font:
      google: Ubuntu Mono

articles:
  - title: "Getting started"
    navbar: ~
    contents:
      - tooltips-hover-info
  - title: "Deep dives"
    navbar: ~
    contents:
      - modules
      - logger-namespaces

reference:
  - title: "App"
    desc: "Entry points for creating and running the Shiny application."
    contents:
      - launch
      - app_ui
      - app_server

  - title: "Modules"
    desc: >
      Shiny modules following the `mod_<name>_ui()` / `mod_<name>_server()`
      convention. Each pair is co-located in a single `mod_<name>.R` file.
    contents:
      - mod_inputs_ui
      - mod_inputs_server
      - mod_outputs_ui
      - mod_outputs_server
      - mod_download_ui
      - mod_download_server

  - title: "Tooltip helpers"
    desc: >
      UI and rendering helpers for attaching tooltip and hover content.
      `mod_tooltip()` targets UI elements; `mod_hoverinfo()` targets
      `reactable` table cells.
    contents:
      - mod_tooltip
      - mod_hoverinfo

  - title: "Logic"
    desc: "Financial data retrieval and transformation functions."
    contents:
      - get_stock_prices
      - get_stock_returns
      - get_ff3_factors
      - compute_rolling_vol
      - summarise_performance
      - default_tickers

  - title: "Utilities"
    desc: "Logging helpers and operators."
    contents:
      - app_set_log_threshold
      - with_logging
      - "%||%"
